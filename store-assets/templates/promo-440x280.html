<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    /* CWS small promo tile is exactly 440×280. Keep it tidy, not busy. */
    html, body { margin: 0; }
    .tile {
      width: 440px; height: 280px; overflow: hidden; position: relative;
      background: linear-gradient(135deg, #1e2a78 0%, #4285f4 100%);
      color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 34px; box-sizing: border-box;
    }
    .row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .icon { width: 56px; height: 56px; border-radius: 13px; background: rgba(255,255,255,.14);
      padding: 7px; box-sizing: border-box; }
    .icon img { width: 100%; height: 100%; display: block; object-fit: contain; }
    .name { font-size: 27px; font-weight: 800; letter-spacing: .2px; }
    .tagline { font-size: 16px; line-height: 1.45; color: #e8eefc; max-width: 360px; }
    .disclaimer { position: absolute; left: 34px; bottom: 16px; font-size: 11px; color: #c8d6f7; opacity: .9; }
  </style>
</head>
<body>
  <div class="tile">
    <div class="row">
      <div class="icon"><img src="../../assets/icons/icon128.png" alt="" /></div>
      <div class="name">{{NAME}}</div>
    </div>
    <div class="tagline">{{TAGLINE}}</div>
    <div class="disclaimer">{{DISCLAIMER}}</div>
  </div>
</body>
</html>
