<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Extension</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }
    h1 { font-size: 18px; margin-bottom: 4px; }
    .description { color: #666; line-height: 1.5; margin-bottom: 12px; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .toggle-label { font-size: 13px; font-weight: 500; }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #4285f4;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(20px);
    }
    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      transition: all 0.2s;
    }
    .status.active {
      background: #f0fdf4;
      color: #16a34a;
    }
    .status.inactive {
      background: #fef2f2;
      color: #dc2626;
    }
  </style>
</head>
<body>
  <h1>My Extension</h1>
  <p class="description">Your browser extension is running.</p>

  <div class="toggle-row">
    <span class="toggle-label">Enable extension</span>
    <label class="toggle">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="status active" id="status">Active</div>

  <script src="popup.js"></script>
</body>
</html>
