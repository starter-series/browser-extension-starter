<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <h1>Settings</h1>
  <p class="subtitle">Synced to your browser profile via <code>chrome.storage.sync</code>.</p>

  <form id="settings-form" novalidate>
    <div class="setting setting-inline">
      <label>
        <input type="checkbox" id="highlightEnabled">
        Enable highlighting
      </label>
      <span class="hint">When off, the content script exits early on every page.</span>
    </div>

    <div class="setting setting-color">
      <label for="highlightColor">Highlight color</label>
      <div class="color-row">
        <span class="color-preview" id="colorPreview" aria-hidden="true"></span>
        <input
          type="text"
          id="highlightColor"
          inputmode="text"
          autocomplete="off"
          spellcheck="false"
          pattern="^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$"
          aria-describedby="highlightColor-error"
        >
      </div>
      <span class="hint">Hex color, e.g. <code>#FFEB3B</code>.</span>
      <span class="error" id="highlightColor-error" role="alert"></span>
    </div>

    <div class="setting setting-textarea">
      <label for="blockedDomains">Blocked domains</label>
      <textarea
        id="blockedDomains"
        placeholder="example.com&#10;news.example.org"
        spellcheck="false"
        aria-describedby="blockedDomains-error"
      ></textarea>
      <span class="hint">One hostname per line. The extension will skip these pages.</span>
      <span class="error" id="blockedDomains-error" role="alert"></span>
    </div>

    <div class="actions">
      <button type="submit" id="save">Save</button>
      <span class="status" id="status" role="status" aria-live="polite"></span>
    </div>
  </form>

  <script src="../settings.js"></script>
  <script src="options.js"></script>
</body>
</html>
