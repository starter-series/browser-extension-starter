name: Deploy to Firefox Add-ons

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        default: 'listed'
        type: choice
        options:
          - listed
          - unlisted

concurrency:
  group: deploy-firefox
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying v$VERSION to Firefox Add-ons"

      - name: Check tag doesn't already exist
        run: |
          TAG="v${{ steps.version.outputs.version }}-firefox"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump the version in manifest.json first."
            exit 1
          fi

      - name: Validate secrets
        env:
          HAS_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER != '' }}
          HAS_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET != '' }}
        run: |
          MISSING=""
          if [ "$HAS_JWT_ISSUER" != "true" ]; then MISSING="$MISSING AMO_JWT_ISSUER"; fi
          if [ "$HAS_JWT_SECRET" != "true" ]; then MISSING="$MISSING AMO_JWT_SECRET"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING — See docs/AMO_SETUP.md"
            exit 1
          fi

      - name: Build
        run: npx web-ext build --source-dir . --artifacts-dir dist --overwrite-dest --filename extension.zip

      - name: Submit to Firefox Add-ons
        env:
          CHANNEL: ${{ inputs.channel }}
          AMO_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: npx web-ext sign --source-dir . --channel "$CHANNEL" --api-key "$AMO_API_KEY" --api-secret "$AMO_API_SECRET"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: firefox-v${{ steps.version.outputs.version }}
          path: dist/extension.zip
          retention-days: 30
