name: Deploy to Chrome Web Store

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: 'Publish target'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - trustedTesters

concurrency:
  group: deploy-chrome
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying v$VERSION"

      - name: Check tag doesn't already exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Bump the version in manifest.json first."
            exit 1
          fi

      - name: Validate secrets
        env:
          HAS_EXT_ID: ${{ secrets.CWS_EXTENSION_ID != '' }}
          HAS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID != '' }}
          HAS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET != '' }}
          HAS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN != '' }}
        run: |
          MISSING=""
          if [ "$HAS_EXT_ID" != "true" ]; then MISSING="$MISSING CWS_EXTENSION_ID"; fi
          if [ "$HAS_CLIENT_ID" != "true" ]; then MISSING="$MISSING CWS_CLIENT_ID"; fi
          if [ "$HAS_CLIENT_SECRET" != "true" ]; then MISSING="$MISSING CWS_CLIENT_SECRET"; fi
          if [ "$HAS_REFRESH_TOKEN" != "true" ]; then MISSING="$MISSING CWS_REFRESH_TOKEN"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING — See docs/CWS_SETUP.md"
            exit 1
          fi

      - name: Build zip
        run: npm run build:chrome

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: dist/extension.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true
          publish-target: ${{ inputs.publish_target }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Chrome Web Store Deployment

            - **Version:** ${{ steps.version.outputs.version }}
            - **Publish target:** ${{ inputs.publish_target }}
            - **Deployed by:** @${{ github.actor }}
          files: dist/extension.zip
          generate_release_notes: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-v${{ steps.version.outputs.version }}
          path: dist/extension.zip
          retention-days: 30
